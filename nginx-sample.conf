# ─── Task Watcher — Nginx reverse proxy config ───────────────────────────────
#
# 1. Install:  sudo apt install nginx certbot python3-certbot-nginx
# 2. Copy:     sudo cp nginx-sample.conf /etc/nginx/sites-available/taskwatcher
# 3. Edit the two `server_name` lines to your actual domain
# 4. Enable:   sudo ln -s /etc/nginx/sites-available/taskwatcher /etc/nginx/sites-enabled/
# 5. SSL:      sudo certbot --nginx -d yourdomain.com
# 6. Reload:   sudo systemctl reload nginx
#
# Task Watcher runs on 127.0.0.1:3747 (default TW_HOST).
# Nginx listens on 443 (HTTPS) and forwards all traffic to the Node.js server.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com;

    # SSL — managed by Certbot (do NOT edit these lines manually)
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Optional: protect with a password
    # auth_basic           "Task Watcher";
    # auth_basic_user_file /etc/nginx/.htpasswd;
    # (create with: sudo htpasswd -c /etc/nginx/.htpasswd youruser)

    location / {
        proxy_pass         http://127.0.0.1:3747;
        proxy_http_version 1.1;

        # WebSocket support (required for live updates)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;  # keep WS connections alive
    }
}
